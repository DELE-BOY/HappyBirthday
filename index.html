<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#125b77">
    <meta name="description" content="A special birthday experience">
    <title>Happy Birthday</title>

    <!--
        Open Graph / Social sharing
        ─────────────────────────────────────────────────────────────
        Before sending, replace the two placeholder values below:

        og:url   → your full GitHub Pages URL for this page
                   e.g. https://username.github.io/repo-name/

        og:image → a full URL to a preview image (1200×630px ideal)
                   e.g. https://username.github.io/repo-name/img/preview.jpg
                   WhatsApp, iMessage and Twitter all read this field.
        ─────────────────────────────────────────────────────────────
    -->
    <meta property="og:type"        content="website">
    <meta property="og:url"         content="https://DELE-BOY.github.io/HappyBirthday/">
    <meta property="og:title"       content="Happy Birthday!">
    <meta property="og:description" content="A special birthday experience made just for you. Open this.">
    <meta property="og:image"       content="https://DELE-BOY.github.io/HappyBirthday/img/YOUR_PREVIEW.jpg">
    <meta name="twitter:card"       content="summary_large_image">
    <meta name="twitter:title"      content="Happy Birthday!">
    <meta name="twitter:description" content="A special birthday experience made just for you. Open this.">
    <meta name="twitter:image"      content="https://DELE-BOY.github.io/HappyBirthday/img/YOUR_PREVIEW.jpg">

    <link rel="icon" href="data:,">

    <!--
        Font loading strategy:
        preconnect hints reduce DNS + TLS handshake time.
        display=swap shows fallback text immediately (prevents FOIT).
        Poppins 300 added for the hint text's light weight.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

    <!--
        transitions.js is loaded here (blocking) so DOMContentLoaded
        fires before the first paint — this guarantees the overlay is
        built before any content renders, preventing flash-of-content.
    -->
    <script src="./Transitions.js"></script>
    <script src="./Sounds.js" defer></script>

    <style>
        /* ============================================================
         * Design tokens
         * ============================================================ */
        :root {
            --blue-deep:   #125b77;
            --blue-light:  #6fa8dc;
            --cream:       #FEFCF8;
            --cream-warm:  #F0E8D5;
            --flap-color:  #E8E0CC;
            --fold-top:    #F5EFE2;
            --gold-bright: #f5d27a;
            --gold-mid:    #c8941a;
            --gold-dark:   #9a6b00;
        }

        *, *::before, *::after { box-sizing: border-box; }

        /* ============================================================
         * Page base
         * ============================================================ */
        body {
            margin: 0;
            font-family: 'Poppins', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: clamp(1rem, 3vh, 2rem);
            height: 100vh;
            height: 100svh;
            overflow: hidden;
            /*
             * Background: the deep-to-light blue gradient anchors the
             * "envelope arriving by post" mood. Keep it clean — the
             * envelope IS the experience on this page.
             */
            background: linear-gradient(145deg, var(--blue-deep) 0%, #1a7396 55%, var(--blue-light) 100%);
        }

        /*
         * Subtle radial spotlight behind the envelope — suggests the
         * envelope is sitting under a soft light, making it feel like
         * a physical object rather than a flat graphic.
         */
        body::before {
            content: '';
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: min(700px, 130vw);
            height: min(560px, 130vh);
            background: radial-gradient(ellipse, rgba(255,255,255,0.07) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* ============================================================
         * Preloader
         *
         * z-index: 100000 — must sit above the transitions.js overlay
         * (which uses z-index: 99999) to remain visible during the
         * initial overlay fade-out on arrival.
         * ============================================================ */
        .preloader {
            display: flex;
            justify-content: center;
            align-items: center;
            position: fixed;
            inset: 0;
            z-index: 100000;
            background: var(--blue-deep);
            transition: opacity 0.5s ease;
        }

        .preloader.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .preloader-ring {
            width: 52px; height: 52px;
            border: 5px solid rgba(255,255,255,0.18);
            border-top-color: rgba(255,255,255,0.85);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        /* ============================================================
         * Main content
         * Starts invisible; fades in once preloader clears.
         * ============================================================ */
        .main-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: clamp(0.75rem, 2.5vh, 1.5rem);
            opacity: 0;
            transition: opacity 0.75s ease;
            position: relative;
            z-index: 1;
        }

        .main-content.visible { opacity: 1; }

        /* ============================================================
         * Title
         * ============================================================ */
        .page-title {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(1.8rem, 5vw, 3.2rem);
            color: white;
            margin: 0;
            text-shadow: 0 2px 20px rgba(0,0,0,0.2);
            text-align: center;
            padding: 0 1rem;
        }

        /* ============================================================
         * Envelope scene
         *
         * perspective here is the ONLY place 3D perspective should
         * be defined. It creates the depth context for the flap's
         * rotateX animation. perspective-origin at 38% (slightly
         * above center) makes the 3D fold feel natural for an
         * envelope you're looking slightly down at.
         * ============================================================ */
        .envelope-scene {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: clamp(0.75rem, 2vh, 1.25rem);
            perspective: 900px;
            perspective-origin: 50% 38%;
        }

        /* ============================================================
         * Envelope wrapper
         *
         * CRITICAL: transform-style: preserve-3d is required here so
         * the child .env-flap can rotate in true 3D space.
         *
         * CRITICAL: filter CANNOT be applied to elements with
         * transform-style: preserve-3d — it collapses the stacking
         * context and breaks 3D children. Hover glow goes on .env-body
         * (box-shadow) instead.
         * ============================================================ */
        .envelope {
            position: relative;
            width: min(400px, 88vw);
            /* Maintain letter-envelope proportions: roughly 1.54:1 width/height */
            height: calc(min(400px, 88vw) * 0.63);
            cursor: pointer;
            transform-style: preserve-3d;
            animation: envFloat 4.5s ease-in-out infinite;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        @keyframes envFloat {
            0%, 100% { transform: translateY(0)    rotate(-1.5deg); }
            50%       { transform: translateY(-14px) rotate(1.5deg); }
        }

        /* Pause the float exactly where it is when the user clicks */
        .envelope.opening { animation-play-state: paused; }

        /* Focus ring: uses outline on .env-body since filter on
         * .envelope would break preserve-3d */
        .envelope:focus-visible { outline: none; }
        .envelope:focus-visible .env-body {
            outline: 3px solid rgba(255,255,255,0.75);
            outline-offset: 6px;
        }

        /* ============================================================
         * Envelope body — the main cream front face
         *
         * overflow: hidden clips the fold triangles cleanly to the
         * rectangle. .env-letter and .env-flap are SIBLINGS (not
         * children) of .env-body so they are NOT clipped by this.
         * ============================================================ */
        .env-body {
            position: absolute;
            inset: 0;
            background: linear-gradient(160deg, var(--cream) 0%, #F6EFE1 55%, var(--cream-warm) 100%);
            border-radius: 2px 2px 10px 10px;
            overflow: hidden;
            box-shadow:
                0 4px 6px   rgba(0,0,0,0.07),
                0 10px 20px rgba(0,0,0,0.14),
                0 28px 56px rgba(0,0,0,0.22);
            transition: box-shadow 0.3s ease;
            z-index: 2;
        }

        /* Subtle inner shadow at the top suggests depth under the flap */
        .env-body::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 55%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.06), transparent);
            pointer-events: none;
            transition: opacity 0.75s ease;
        }

        /* Inner shadow fades as flap opens (light enters the envelope) */
        .envelope.opening .env-body::after { opacity: 0; }

        /* Hover: blue glow communicates interactability without filter */
        .envelope:hover:not(.opening) .env-body {
            box-shadow:
                0 4px 6px   rgba(0,0,0,0.07),
                0 10px 20px rgba(0,0,0,0.14),
                0 28px 56px rgba(0,0,0,0.22),
                0 0 0 2px   rgba(111,168,220,0.55),
                0 0 36px    rgba(111,168,220,0.22);
        }

        /* ============================================================
         * Fold pattern — the diamond crease on an envelope's front
         *
         * Three triangular regions of subtle tonal shading create the
         * impression of paper folded from each edge toward the centre.
         * Very subtle — the goal is realism, not decoration.
         * ============================================================ */
        .env-fold {
            position: absolute;
            pointer-events: none;
        }

        /* Bottom V — base at bottom edge, tip at vertical centre */
        .env-fold-bottom {
            inset: 0;
            background: linear-gradient(to top, rgba(110,85,55,0.09), transparent);
            clip-path: polygon(0 100%, 100% 100%, 50% 0%);
        }

        /* Left triangle — from left edge to centre */
        .env-fold-left {
            inset: 0;
            background: linear-gradient(to right, rgba(0,0,0,0.055), transparent);
            clip-path: polygon(0 0, 50% 50%, 0 100%);
        }

        /* Right triangle — mirror of left */
        .env-fold-right {
            inset: 0;
            background: linear-gradient(to left, rgba(0,0,0,0.055), transparent);
            clip-path: polygon(100% 0, 50% 50%, 100% 100%);
        }

        /* ============================================================
         * Letter card — tucked inside, rises on open
         *
         * Starts at translateY(14%) — lower portion hidden under the
         * body element. When .rising is added: springs upward above
         * the envelope with a satisfying overshoot (cubic-bezier spring).
         *
         * z-index starts at 1 (behind body at z-index 2). JS elevates
         * it to 5 at the right moment — CSS z-index doesn't animate,
         * so we can't use a transition on this property.
         * ============================================================ */
        .env-letter {
            position: absolute;
            bottom: 5%; left: 8%;
            width: 84%; height: 74%;
            background: white;
            border-radius: 3px;
            box-shadow:
                0 2px 6px  rgba(0,0,0,0.1),
                0 6px 16px rgba(0,0,0,0.08);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            z-index: 1;
            transform: translateY(14%);
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .env-letter.rising {
            transform: translateY(-50%);
            z-index: 5; /* above all envelope elements */
        }

        .letter-emoji {
            font-size: clamp(1.6rem, 7vw, 2.4rem);
            line-height: 1;
        }

        .letter-text {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(0.85rem, 3.5vw, 1.1rem);
            color: #aaa;
            letter-spacing: 2px;
        }

        /* ============================================================
         * Envelope flap — the top triangular seal
         *
         * Geometry: a triangle pointing DOWN from the full top edge to
         * a single point at the bottom-centre of the div.
         * clip-path: polygon(0 0, 100% 0, 50% 100%)
         *
         * The div is 54% of the envelope's height so the triangle tip
         * lands just past the vertical midpoint — matching a real
         * envelope's proportions.
         *
         * Opening: rotateX(-192deg) rotates it BACKWARD around the top
         * hinge edge. It disappears at ~-90deg (backface-visibility: hidden)
         * creating a clean fold-away effect.
         *
         * The colour is slightly cooler than the body to suggest the
         * inside-facing paper surface.
         * ============================================================ */
        .env-flap {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 54%;
            background: linear-gradient(172deg, var(--fold-top) 0%, var(--flap-color) 100%);
            clip-path: polygon(0 0, 100% 0, 50% 100%);
            transform-origin: top center;
            transform: rotateX(0deg);
            transition: transform 0.78s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            backface-visibility: hidden;
            z-index: 3;
            /*
             * NOTE: filter is intentionally NOT applied here.
             * filter on any child of a transform-style: preserve-3d
             * parent creates a new flat stacking context that can break
             * the 3D rotation in Firefox and Safari. Depth is conveyed
             * purely through the gradient and the fold colour difference. */
        }

        .envelope.opening .env-flap {
            transform: rotateX(-192deg);
        }

        /* ============================================================
         * Wax seal
         *
         * A pulsing gold circle centered on the body. The radial
         * gradient simulates a convex wax surface with a specular
         * highlight at the top-left.
         *
         * Disappears (scale → 0, opacity → 0) when the envelope opens.
         * CSS handles this cleanly via .envelope.opening descendent rule.
         *
         * NOTE: transform includes translate(-50%,-50%) for centering —
         * ALL transform variants must include this to avoid a position jump.
         * ============================================================ */
        .env-seal {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 48px; height: 48px;
            background: radial-gradient(
                circle at 33% 33%,
                var(--gold-bright) 0%,
                var(--gold-mid)    45%,
                var(--gold-dark)   100%
            );
            border-radius: 50%;
            box-shadow:
                0 2px 8px  rgba(0,0,0,0.3),
                0 0 0 3px  rgba(200,148,26,0.22),
                inset 0 1px 3px rgba(255,255,255,0.3);
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
            z-index: 4;
            animation: sealPulse 2.8s ease-in-out infinite;
            transition:
                transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1),
                opacity   0.22s ease;
        }

        @keyframes sealPulse {
            0%, 100% {
                box-shadow:
                    0 2px 8px  rgba(0,0,0,0.3),
                    0 0 0 3px  rgba(200,148,26,0.22),
                    inset 0 1px 3px rgba(255,255,255,0.3);
            }
            50% {
                box-shadow:
                    0 2px 8px  rgba(0,0,0,0.3),
                    0 0 0 8px  rgba(200,148,26,0.07),
                    0 0 28px   rgba(200,148,26,0.38),
                    inset 0 1px 3px rgba(255,255,255,0.3);
            }
        }

        /* Scale up slightly on hover to signal clickability */
        .envelope:hover:not(.opening) .env-seal {
            transform: translate(-50%, -50%) scale(1.13);
        }

        /* Disappear when envelope opens */
        .envelope.opening .env-seal {
            transform: translate(-50%, -50%) scale(0);
            opacity: 0;
            animation: none;
        }

        /* ============================================================
         * Interaction hint
         * Pulses gently between low and medium opacity.
         * ============================================================ */
        .open-hint {
            margin: 0;
            color: rgba(255,255,255,0.48);
            font-size: 0.78rem;
            font-weight: 300;
            letter-spacing: 1.8px;
            text-transform: lowercase;
            animation: hintPulse 3.2s ease-in-out infinite;
            transition: opacity 0.3s ease;
        }

        @keyframes hintPulse {
            0%, 100% { opacity: 0.4; }
            50%       { opacity: 0.82; }
        }

        .open-hint.hidden {
            opacity: 0 !important;
            animation: none;
            pointer-events: none;
        }

        /* ============================================================
         * Secondary CTA button
         *
         * Deliberately understated (glassmorphic) so it doesn't
         * compete with the envelope as the primary interaction target.
         * Serves discoverability for users who don't try clicking
         * the envelope itself.
         * ============================================================ */
        .open-btn {
            padding: 12px 36px;
            font-family: 'Poppins', sans-serif;
            font-size: clamp(0.82rem, 2vw, 0.95rem);
            font-weight: 400;
            color: rgba(255,255,255,0.92);
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 40px;
            cursor: pointer;
            letter-spacing: 0.5px;
            transition:
                background  0.25s ease,
                border-color 0.25s ease,
                transform   0.2s ease,
                box-shadow  0.25s ease;
        }

        .open-btn:hover:not(:disabled) {
            background: rgba(255,255,255,0.22);
            border-color: rgba(255,255,255,0.5);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.16);
        }

        .open-btn:active:not(:disabled) { transform: translateY(0); }

        .open-btn:disabled {
            opacity: 0.65;
            cursor: default;
        }

        .open-btn:focus-visible {
            outline: 2px solid rgba(255,255,255,0.75);
            outline-offset: 4px;
        }

        /* ============================================================
         * Loading spinner — appears inside the button after click
         * ============================================================ */
        .loading-spinner {
            display: inline-block;
            width: 15px; height: 15px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ============================================================
         * Confetti — infinite rain, timed to envelope opening.
         *
         * Fires when the flap starts rotating so the confetti begins
         * to "spill out" of the envelope as it opens. The transition
         * overlay sweeps in at 460ms, carrying the celebration forward
         * to Welcome.html as a visual handoff.
         * ============================================================ */
        #confetti-layer {
            position: fixed; inset: 0;
            pointer-events: none;
            z-index: 100;
        }

        .confetti {
            position: fixed;
            transform-origin: top center;
            border-radius: 2px;
            animation: fall infinite;
        }

        @keyframes fall {
            0%   { transform: translateY(-100vh) rotate(var(--rotation)); opacity: 0; }
            8%   { opacity: 1; }
            92%  { opacity: 1; }
            100% { transform: translateY(100vh)  rotate(var(--rotation)); opacity: 0; }
        }

        /* ============================================================
         * Responsive
         * ============================================================ */
        @media (max-height: 560px) {
            body  { gap: 0.6rem; }
            .page-title { font-size: 1.5rem; }
            .envelope-scene { gap: 0.5rem; }
        }

        /* Honour user preference — remove all decorative motion */
        @media (prefers-reduced-motion: reduce) {
            .envelope         { animation: none; }
            .env-seal         { animation: none; }
            .open-hint        { animation: none; opacity: 0.6; }
            .preloader-ring   { animation: none; }
            .loading-spinner  { animation: none; }
            .env-flap         { transition: none; }
            .env-letter       { transition: none; }
            .main-content     { transition: none; }
        }
    </style>
</head>
<body>

    <!--
        Preloader
        z-index: 100000 sits above the transitions.js overlay (99999)
        so the spinner remains visible during the overlay's fade-out.
    -->
    <div class="preloader" id="preloader" aria-label="Loading" aria-busy="true">
        <div class="preloader-ring"></div>
    </div>

    <!-- Main experience — fades in once preloader clears -->
    <div class="main-content" id="mainContent">

        <h1 class="page-title">Happy Birthday!</h1>

        <!--
            Envelope scene.
            perspective on this wrapper creates the 3D depth context
            for the flap's rotateX animation.
        -->
        <div class="envelope-scene">

            <!--
                The envelope.

                Architecture notes:
                - transform-style: preserve-3d → enables child 3D rotations
                - Float animation runs on idle; pauses in place on click
                - The ENTIRE element is the primary click/keyboard target
                - filter cannot be used here (breaks preserve-3d);
                  glow effects live on .env-body instead

                DOM order (determines base z-stacking within 3D context):
                  .env-letter (z:1) → hidden inside
                  .env-body   (z:2) → main face, covers letter
                  .env-flap   (z:3) → top triangle, rotates away
                  .env-seal   (z:4) → gold disc, disappears on open
            -->
            <div class="envelope"
                 id="envelope"
                 role="button"
                 tabindex="0"
                 aria-label="Open the birthday envelope"
                 onclick="handleOpen()"
                 onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();handleOpen();}">

                <!-- Letter card: hidden inside, springs out when flap opens -->
                <div class="env-letter" id="envLetter" aria-hidden="true">
                    <span class="letter-emoji">🎉</span>
                    <span class="letter-text">Welcome</span>
                </div>

                <!-- Main envelope face with decorative fold pattern -->
                <div class="env-body">
                    <div class="env-fold env-fold-bottom"></div>
                    <div class="env-fold env-fold-left"></div>
                    <div class="env-fold env-fold-right"></div>
                </div>

                <!-- Top flap — rotates backward to reveal the letter -->
                <div class="env-flap" aria-hidden="true"></div>

                <!-- Wax seal — gold disc, pulsing, disappears on open -->
                <div class="env-seal" id="envSeal" aria-hidden="true">💌</div>

            </div>

            <!-- Subtle discoverability cue below the envelope -->
            <p class="open-hint" id="openHint" aria-hidden="true">click to open ✨</p>

            <!-- Secondary CTA for users who don't try the envelope -->
            <button class="open-btn" id="openBtn" onclick="handleOpen()">
                Open Envelope
            </button>

        </div>

    </div>

    <!-- Confetti rain particles are injected here by generateConfetti() -->
    <div id="confetti-layer" aria-hidden="true"></div>

    <script>
        /* ============================================================
         * DOM refs
         * ============================================================ */
        const preloader     = document.getElementById('preloader');
        const mainContent   = document.getElementById('mainContent');
        const envelope      = document.getElementById('envelope');
        const envLetter     = document.getElementById('envLetter');
        const envSeal       = document.getElementById('envSeal');
        const openHint      = document.getElementById('openHint');
        const openBtn       = document.getElementById('openBtn');
        const confettiLayer = document.getElementById('confetti-layer');

        /* ============================================================
         * State
         * ============================================================ */
        let isOpening = false;

        /* ============================================================
         * Preloader
         *
         * 1.6s feels right — short enough not to frustrate, long
         * enough for fonts and the page to be fully ready.
         * The transitions.js overlay will have already faded out by
         * then (it starts fading immediately on DOMContentLoaded).
         * ============================================================ */
        setTimeout(() => {
            preloader.classList.add('hidden');
            mainContent.classList.add('visible');
            /*
             * Confetti starts 400ms after the envelope fades into view —
             * one beat of breathing room so the envelope appears first,
             * then the celebration begins. Guarded by prefers-reduced-motion
             * since confetti is purely decorative motion.
             */
            if (!window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
                setTimeout(() => generateConfetti(80), 400);
            }
        }, 1600);

        /* ============================================================
         * handleOpen()
         *
         * The primary interaction handler. Called by both the envelope
         * click and the secondary button.
         *
         * Sequence:
         *   0ms   → .opening class: flap rotates, seal disappears (CSS)
         *   380ms → letter rises (flap has rotated past 90° by then)
         *   700ms → PageTransitions.navigateTo kicks off exit fade
         *           (confetti is already raining from preloader reveal)
         *           (520ms fade → ~1220ms total before Welcome.html loads)
         * ============================================================ */
        function handleOpen() {
            if (isOpening) return;
            isOpening = true;

            /* Secondary button: show loading state */
            openBtn.disabled = true;
            openBtn.innerHTML = '<span class="loading-spinner" aria-hidden="true"></span>';

            /* Hide hint */
            openHint.classList.add('hidden');

            /* Trigger CSS transitions: flap rotates, seal scales to 0 */
            envelope.classList.add('opening');

            /* Paper-rustle sound, timed to the flap lifting */
            if (window.SoundFX) SoundFX.playRustle();

            /*
             * Elevate letter at ~380ms — by then the flap has rotated
             * past its ~90° disappearing point (0.49 × 780ms ≈ 382ms),
             * so the letter rises into view with nothing blocking it.
             */
            setTimeout(() => envLetter.classList.add('rising'), 380);

            /*
             * 700ms gives the flap time to nearly complete its rotation
             * and the letter time to begin rising before the overlay sweeps
             * in. Confetti is already raining from the preloader reveal.
             */
            setTimeout(() => PageTransitions.navigateTo('./Welcome.html'), 700);
        }

        /* ============================================================
         * generateConfetti(count)
         *
         * Spawns infinite-fall confetti timed to the envelope opening.
         * All pieces added in one DocumentFragment (single DOM reflow).
         * No cleanup needed — the page navigates away within ~1 second.
         *
         * Short animation-delay range (0–0.6s) ensures the cascade
         * begins almost immediately so users see celebration before
         * the transition overlay sweeps in at 460ms.
         * ============================================================ */
        function generateConfetti(count) {
            const colors = ['#ff4d4d','#ffff66','#66b3ff','#ff99cc','#99ff99','#c9a94f','#ff9900','#cc66ff'];
            const frag   = document.createDocumentFragment();

            for (let i = 0; i < count; i++) {
                const el   = document.createElement('div');
                el.classList.add('confetti');
                const size = (Math.random() * 8 + 4).toFixed(1);
                el.style.cssText = `
                    background:${colors[Math.floor(Math.random() * colors.length)]};
                    width:${size}px;
                    height:${(+size * 2).toFixed(1)}px;
                    left:${(Math.random() * 100).toFixed(1)}%;
                    animation-delay:${(Math.random() * 0.6).toFixed(2)}s;
                    animation-duration:${(Math.random() * 2 + 2.4).toFixed(2)}s;
                    --rotation:${Math.floor(Math.random() * 360)}deg;
                `;
                frag.appendChild(el);
            }

            confettiLayer.appendChild(frag);
        }
    </script>
</body>
