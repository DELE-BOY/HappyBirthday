<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#080808">
    <title>Gallery — Happy Birthday Demi 📸</title>

    <!--
        Open Graph / Social sharing — see index.html for the full
        explanation. Replace the placeholder URL values before sending.
    -->
    <meta property="og:type"        content="website">
    <meta property="og:url"         content="https://YOUR_USERNAME.github.io/YOUR_REPO/PhotoCollage.html">
    <meta property="og:title"       content="A Gallery for Demi 📸">
    <meta property="og:description" content="Moments worth keeping.">
    <meta property="og:image"       content="https://YOUR_USERNAME.github.io/YOUR_REPO/img/YOUR_PREVIEW.jpg">
    <meta name="twitter:card"       content="summary_large_image">
    <meta name="twitter:title"      content="A Gallery for Demi 📸">
    <meta name="twitter:image"      content="https://YOUR_USERNAME.github.io/YOUR_REPO/img/YOUR_PREVIEW.jpg">

    <link rel="icon" href="data:,">

    <!--
        Font loading: preconnect reduces DNS + TLS handshake time.
        display=swap shows fallback text while Dancing Script loads.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <!--
        transitions.js: loaded blocking (no defer) so the arrival overlay
        is built before the first paint, preventing a flash of content.
        PhotoCollage.html is registered in transitions.js's THEME map with
        colour #080808, creating a seamless dark → dark handoff from
        HappyBirthday.html.
    -->
    <script src="./transitions.js"></script>

    <!-- All styles live in gallery.css -->
    <link rel="stylesheet" href="./gallery.css">
</head>
<body>

    <!-- ── Page header ─────────────────────────────────────────── -->
    <header class="gallery-header">
        <!--
            data-nav-back: picked up by gallery.js to attach the
            PageTransitions.navigateTo handler — no inline onclick.
        -->
        <button class="back-link" data-nav-back aria-label="Back to birthday messages">
            ← Messages
        </button>
        <span class="header-emoji" aria-hidden="true">📸</span>
        <h1 class="gallery-title">A Gallery for Demi</h1>
        <p class="gallery-tagline">moments worth keeping</p>
    </header>

    <!-- ── Category pills (generated by gallery.js) ────────────── -->
    <nav class="category-nav" id="categoryNav" aria-label="Photo categories"></nav>

    <!-- ── Masonry grid (populated by gallery.js) ──────────────── -->
    <main class="gallery-main">
        <div class="masonry-grid" id="galleryGrid"></div>
    </main>

    <!-- ── Lightbox ────────────────────────────────────────────── -->
    <div class="lightbox"
         id="lightbox"
         role="dialog"
         aria-modal="true"
         aria-label="Photo viewer">

        <button class="lb-close" aria-label="Close photo viewer">×</button>
        <button class="lb-arrow lb-prev" aria-label="Previous photo">‹</button>
        <button class="lb-arrow lb-next" aria-label="Next photo">›</button>

        <div class="lb-content">
            <img class="lb-img" id="lbImg" alt="" src="">
            <div class="lb-info">
                <p class="lb-caption" id="lbCaption"></p>
                <p class="lb-counter" id="lbCounter"></p>
            </div>
        </div>
    </div>

    <!-- ── Footer ──────────────────────────────────────────────── -->
    <footer class="gallery-footer">
        <button class="back-to-msgs" data-nav-back aria-label="Return to birthday messages">
            ← Back to Messages
        </button>
        <p class="footer-note">Made with love 💙</p>
    </footer>

    <!--
        gallery.js deferred: fetched in parallel with HTML parsing,
        executed after the DOM is fully ready. Safe to query DOM at
        module level without a DOMContentLoaded wrapper.
    -->
    <script src="./gallery.js" defer></script>
</body>
</html>
